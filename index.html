<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>HTML Download Test</title>
	<script>
		(function(glob){
			const load = async function(evt) {
				// Target file
				const data_url = 'lorem-ipsum.pdf'
				// Get elements
				const doc = glob.document
				const div_a = doc.getElementById('link-anchor-div')
				const div_b = doc.getElementById('link-blob-div')
				const div_d = doc.getElementById('link-blob-dl-div')
				// Prepare ordinary anchor link
				const link_a = doc.createElement('a')
				link_a.href = data_url
				link_a.innerText = 'Open PDF (file)'
				div_a.appendChild(link_a)
				try {
					// Fetch data for blob links
					const response = await fetch(data_url)
					if (!response.ok) {
						throw new Error(response.status)
					}
					const blob = await response.blob()
					const url = URL.createObjectURL(blob)
					// Prepare non-download link
					const link_b = doc.createElement('a')
					link_b.href = url
					link_b.innerText = 'Open PDF (blob)'
					div_b.appendChild(link_b)
					// Prepare download link
					const link_d = doc.createElement('a')
					link_d.href = url
					link_d.innerText = 'Open PDF (blob+download)'
					link_d.setAttribute('download', 'lorem-ipsum.pdf')
					div_d.appendChild(link_d)
				}
				catch (err) {
					const message = `Unable to fetch ${data_url}: ${err.message}`
					div_b.innerText = message
					div_d.innerText = message
				}
			}
			glob.addEventListener('DOMContentLoaded', load)
		})(globalThis);
	</script>
</head>
<body>
	<h1>HTML Download Test</h1>
	<p>The links below download a PDF with sample text.</p>
	<div id="link-anchor-div"></div>
	<div id="link-blob-div"></div>
	<div id="link-blob-dl-div"></div>
</body>
</html>
